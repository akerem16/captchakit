site_name: captchakit
site_description: Async-first, fully type-hinted, minimal captcha library for Python.
site_url: https://akerem16.github.io/captchakit/
repo_url: https://github.com/akerem16/captchakit
repo_name: akerem16/captchakit
edit_uri: edit/main/docs/

theme:
  name: material
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - content.code.copy
    - content.code.annotate
    - toc.follow
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          options:
            show_source: false
            show_root_heading: true
            heading_level: 3
            separate_signature: true
            show_signature_annotations: true

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - toc:
      permalink: true

nav:
  - Overview: index.md
  - Quickstart: quickstart.md
  - Adapters:
      - FastAPI: adapters/fastapi.md
      - aiogram: adapters/aiogram.md
      - Discord: adapters/discord.md
  - Storage: storage.md
  - Themes: themes.md
  - Audio: audio.md
  - i18n: i18n.md
  - Metrics: metrics.md
  - API Reference: api.md
